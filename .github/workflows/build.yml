name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: pip install PyQt6 PyQt6-WebEngine pyinstaller

      - name: Build
        run: pyinstaller --onefile --windowed --name SansFight sans_launcher.py

      - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: SansFight-Windows
          path: dist/SansFight.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sistem bağımlılıkları
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libglib2.0-0 libgl1 libegl1 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libdbus-1-3

      - name: Bağımlılıkları kur
        run: pip install PyQt6 PyQt6-WebEngine pyinstaller

      - name: Build
        run: pyinstaller --onefile --windowed --name SansFight sans_launcher.py

      - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: SansFight-Linux
          path: dist/SansFight
